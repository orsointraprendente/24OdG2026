<script>
    function creaBeep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.15);
        } catch(e) { console.log('Errore beep:', e); }
    }

    function creaFischio() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 2000;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.8);
        } catch(e) { console.log('Errore fischio:', e); }
    }
    
    function creaAvvisoMinuto() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.35].forEach(delay => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 660;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.4, ctx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
            osc.start(ctx.currentTime + delay);
            osc.stop(ctx.currentTime + delay + 0.25);
        });
    } catch(e) { console.log('Errore avviso minuto:', e); }
}
</script>

            async caricaSquadre() {
                try {
                    const { data, error } = await supabase.from('squadre').select('*');
                    if (error) throw error;
                    
                    this.squadre = {};
                    data.forEach(row => {
                        if (!this.squadre[row.nome_squadra]) {
                            this.squadre[row.nome_squadra] = [];
                        }
                        this.squadre[row.nome_squadra].push({
                            numero: row.numero,
                            nome: row.nome_giocatore
                        });
                    });
                } catch (error) {
                    console.error('Errore caricamento squadre:', error);
                }
            },

            async salvaSquadre() {
                try {
                    await supabase.from('squadre').delete().neq('id', 0);
                    const rows = [];
                    Object.keys(this.squadre).forEach(nomeSquadra => {
                        this.squadre[nomeSquadra].forEach(g => {
                            rows.push({
                                nome_squadra: nomeSquadra,
                                numero: g.numero,
                                nome_giocatore: g.nome
                            });
                        });
                    });
                    if (rows.length > 0) {
                        await supabase.from('squadre').insert(rows);
                    }
                } catch (error) {
                    console.error('Errore salvataggio squadre:', error);
                }
            },

sottoscrivi() {
    supabase.channel('db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'partite' },
            async (payload) => {
                const nuovi = payload.new || {};
                const vecchi = payload.old || {};

                // Ignora aggiornamenti heartbeat
                const campiCambiati = Object.keys(nuovi).filter(k => nuovi[k] !== vecchi[k]);
                const soloHeartbeat = campiCambiati.every(k =>
                    k === 'arbitro_timestamp' || k === 'arbitro_attivo'
                );
                if (soloHeartbeat) return;

                // Per UPDATE aggiorna solo la partita modificata
                if (payload.eventType === 'UPDATE' && nuovi.id) {
                    const idx = this.partite.findIndex(x => x.id === nuovi.id);
                    if (idx !== -1) {
                        this.partite[idx] = {
                            ...this.partite[idx],
                            golA: nuovi.gol_a || [],
                            golB: nuovi.gol_b || [],
                            scalpiA: nuovi.scalpi_a || [],
                            scalpiB: nuovi.scalpi_b || [],
                            vuotiA: nuovi.vuoti_a || [],
                            vuotiB: nuovi.vuoti_b || [],
                            espulsiA: nuovi.espulsi_a || [],
                            espulsiB: nuovi.espulsi_b || [],
                            punteggioA: nuovi.punteggio_a || 0,
                            punteggioB: nuovi.punteggio_b || 0,
                            puntiA: nuovi.punti_a || 0,
                            puntiB: nuovi.punti_b || 0,
                            mvpA: nuovi.mvp_a || '',
                            mvpB: nuovi.mvp_b || '',
                            completata: nuovi.completata || false,
                            timerSecondi: nuovi.timer_secondi || 0,
                            timerTempo: nuovi.timer_tempo || 1,
                            timerAttivo: nuovi.timer_attivo || false,
                            timerTimestamp: nuovi.timer_timestamp || 0,
                            recupero1Tempo: nuovi.recupero_1tempo || 0,
                            recupero2Tempo: nuovi.recupero_2tempo || 0,
                            falliDifesaA: nuovi.falli_difesa_a || 0,
                            falliDifesaB: nuovi.falli_difesa_b || 0,
                            vuotiSquadraA: nuovi.vuoti_squadra_a || 0,
                            vuotiSquadraB: nuovi.vuoti_squadra_b || 0,
                            cartelliniA: nuovi.cartellini_a || [],
                            cartelliniB: nuovi.cartellini_b || [],
                        };
                        this.sincronizzaTimer();
                        this.render();
                        return;
                    }
                }

                // Per INSERT o DELETE ricarica tutto
                await this.caricaPartite();
                this.render();
            }
        )
        .subscribe();
},

            sincronizzaTimer() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }

                if (this.partitaSelezionata) {
                    const p = this.partite.find(x => x.id === this.partitaSelezionata);
                    if (p && p.timerAttivo) {
                        const ora = Date.now();
                        const elapsed = Math.floor((ora - p.timerTimestamp) / 1000);
                        const secondiCorretti = p.timerSecondi + elapsed;
                        
                        this.aggiornaTimerDisplay(secondiCorretti, p.timerTempo);
                        
                        this.timerInterval = setInterval(() => {
                            this.aggiornaTimerLocale();
                        }, 1000);
                    }
                }
            },

aggiornaTimerLocale() {
    if (!this.partitaSelezionata) return;
    
    const p = this.partite.find(x => x.id === this.partitaSelezionata);
    if (!p || !p.timerAttivo) return;
    
    const ora = Date.now();
    const elapsed = Math.floor((ora - p.timerTimestamp) / 1000);
    const secondiCorretti = p.timerSecondi + elapsed;
    
    const tempoRegolamentare = 900;
    const recupero = p.timerTempo === 1 ? p.recupero1Tempo : p.recupero2Tempo;
    const tempoTotale = tempoRegolamentare + (recupero * 60);
    const secondiRimasti = tempoTotale - secondiCorretti;

    // Suono a 1 minuto dalla fine (60 secondi rimasti)
    if (secondiRimasti <= 60 && secondiRimasti > 59 && !this.avvisoMinutoSuonato) {
        this.avvisoMinutoSuonato = true;
        creaAvvisoMinuto();
    }

    // Beep ultimi 15 secondi
    if (secondiRimasti > 0 && secondiRimasti <= 15) {
        creaBeep();
    }

    // Fischio alla fine del tempo regolamentare (ma il timer continua)
    if (p.timerTempo === 1 && secondiCorretti >= tempoTotale && !this.fischioPrimoTempoSuonato) {
        this.fischioPrimoTempoSuonato = true;
        creaFischio();
    }
    if (p.timerTempo === 2 && secondiCorretti >= tempoTotale && !this.fischioSecondoTempoSuonato) {
        this.fischioSecondoTempoSuonato = true;
        creaFischio();
    }

    this.aggiornaTimerDisplay(secondiCorretti, p.timerTempo);
},
            async prelevaControlloPartita(id) {
                const p = this.partite.find(x => x.id === id);
                if (!p) return false;

                const ora = Date.now();
                
                if (p.arbitroAttivo && p.arbitroAttivo !== this.emailUtente) {
                    const tempoTrascorso = ora - p.arbitroTimestamp;
                    
                    if (tempoTrascorso < TIMEOUT_ARBITRO) {
                        const secondiRimasti = Math.ceil((TIMEOUT_ARBITRO - tempoTrascorso) / 1000);
                        alert(`⚠️ ${p.arbitroAttivo} sta gestendo questa partita.\n\nRiprova tra ${secondiRimasti} secondi.`);
                        return false;
                    }
                }

                try {
                    await supabase.from('partite').update({
                        arbitro_attivo: this.emailUtente,
                        arbitro_timestamp: ora
                    }).eq('id', id);

                    if (this.heartbeatInterval) clearInterval(this.heartbeatInterval);
                    this.heartbeatInterval = setInterval(() => {
                        this.inviaHeartbeat(id);
                    }, 10000);

                    return true;
                } catch (error) {
                    console.error('Errore acquisizione controllo:', error);
                    return false;
                }
            },

            async inviaHeartbeat(id) {
                if (!this.partitaSelezionata || this.partitaSelezionata !== id) {
                    if (this.heartbeatInterval) {
                        clearInterval(this.heartbeatInterval);
                        this.heartbeatInterval = null;
                    }
                    return;
                }

                try {
                    await supabase.from('partite').update({
                        arbitro_timestamp: Date.now()
                    }).eq('id', id);
                } catch (error) {
                    console.error('Errore heartbeat:', error);
                }
            },

            async rilasciaControlloPartita(id) {
                if (this.heartbeatInterval) {
                    clearInterval(this.heartbeatInterval);
                    this.heartbeatInterval = null;
                }

                try {
                    await supabase.from('partite').update({
                        arbitro_attivo: '',
                        arbitro_timestamp: 0
                    }).eq('id', id);
                } catch (error) {
                    console.error('Errore rilascio controllo:', error);
                }
            },

async apriPartita(id) {
    const controllo = await this.prelevaControlloPartita(id);
    if (!controllo) return;
    this.partitaSelezionata = id;
    this.sincronizzaTimer();
    this.render();
},

                    if (error) throw error;

            },

            async aggiornaPartita(id, updates) {
                try {
                    const p = this.partite.find(x => x.id === id);
                    const u = { ...p, ...updates };
                    
                    const dbUpdates = {
                        squadra_a: u.squadraA, squadra_b: u.squadraB,
                        gol_a: u.golA, gol_b: u.golB,
                        scalpi_a: u.scalpiA, scalpi_b: u.scalpiB,
                        vuoti_a: u.vuotiA, vuoti_b: u.vuotiB,
                        espulsi_a: u.espulsiA, espulsi_b: u.espulsiB,
                        punteggio_a: u.punteggioA, punteggio_b: u.punteggioB,
                        punti_a: u.puntiA, punti_b: u.puntiB,
                        mvp_a: u.mvpA, mvp_b: u.mvpB,
                        completata: u.completata
                    };

                    if ('timerSecondi' in updates) dbUpdates.timer_secondi = u.timerSecondi;
                    if ('timerTempo' in updates) dbUpdates.timer_tempo = u.timerTempo;
                    if ('timerAttivo' in updates) dbUpdates.timer_attivo = u.timerAttivo;
                    if ('timerTimestamp' in updates) dbUpdates.timer_timestamp = u.timerTimestamp;
                    if ('recupero1Tempo' in updates) dbUpdates.recupero_1tempo = u.recupero1Tempo;
                    if ('recupero2Tempo' in updates) dbUpdates.recupero_2tempo = u.recupero2Tempo;
                    if ('falliDifesaA' in updates) dbUpdates.falli_difesa_a = u.falliDifesaA;
                    if ('falliDifesaB' in updates) dbUpdates.falli_difesa_b = u.falliDifesaB;
                    if ('vuotiSquadraA' in updates) dbUpdates.vuoti_squadra_a = u.vuotiSquadraA;
							      if ('vuotiSquadraB' in updates) dbUpdates.vuoti_squadra_b = u.vuotiSquadraB;
							      if ('cartelliniA' in updates) dbUpdates.cartellini_a = u.cartelliniA;
                    if ('cartelliniB' in updates) dbUpdates.cartellini_b = u.cartelliniB;
                    
                    const { error } = await supabase.from('partite').update(dbUpdates).eq('id', id);
                    if (error) throw error;
                    
                    const idx = this.partite.findIndex(x => x.id === id);
                    if (idx !== -1) {
                        this.partite[idx] = u;
                    }
                    
                    this.render();
                } catch (error) {
                    console.error('Errore aggiornamento partita:', error);
                }
            },

            async eliminaPartita(id) {
                if (!confirm('Eliminare questa partita?')) return;
                try {
                    const { error } = await supabase.from('partite').delete().eq('id', id);
                    if (error) throw error;
                } catch (error) {
                    console.error('Errore eliminazione partita:', error);
                }
            },

            formatoTempo(secondi) {
                const min = Math.floor(secondi / 60);
                const sec = secondi % 60;
                return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            },

            async avviaTimer(id) {
    const p = this.partite.find(x => x.id === id);
    if (!p) return;

    const controllo = await this.prelevaControlloPartita(id);
    if (!controllo) return;

    this.partitaSelezionata = id;

    // Reset flags audio
    this.avvisoMinutoSuonato = false;
    this.fischioPrimoTempoSuonato = false;
    this.fischioSecondoTempoSuonato = false;

    await this.aggiornaPartita(id, {
        timerAttivo: true,
        timerTimestamp: Date.now()
    });

    this.sincronizzaTimer();
},

            async pausaTimer(id) {
                const p = this.partite.find(x => x.id === id);
                if (!p) return;

                const ora = Date.now();
                const elapsed = Math.floor((ora - p.timerTimestamp) / 1000);
                const secondiAttuali = p.timerSecondi + elapsed;

            async aggiungiCartellino(id, squadra, giocatore, tipo) {
    const p = this.partite.find(x => x.id === id);

    const cartellinoCampo = `cartellini${squadra}`;
    const nuoviCartellini = [...p[cartellinoCampo], {
        giocatore,
        tipo,
        tempo: p.timerTempo
    }];

    const updates = { [cartellinoCampo]: nuoviCartellini };

    // Se cartellino nero, registra nella tabella squalifiche
    if (tipo === 'nero') {
        try {
            await supabase.from('squalifiche').insert([{
                nome_giocatore: giocatore,
                nome_squadra: p[`squadra${squadra}`],
                partita_id: id
            }]);
            await this.caricaSqualifiche();
        } catch (e) {
            console.error('Errore registrazione squalifica:', e);
        }
        alert(`⬛ SQUALIFICA!\n${giocatore} è squalificato per tutto il torneo.\n\nPuò essere sostituito alla prossima meta o al prossimo tempo.`);
    } else if (tipo === 'rosso') {
        alert(`🟥 CARTELLINO ROSSO!\n${giocatore} è escluso per tutta la partita.\n\nPuò essere sostituito alla prossima meta o al prossimo tempo.`);
    } else {

        alert(`🟨 CARTELLINO GIALLO!\n${giocatore} è escluso per questo tempo.\n\nPotrà rientrare ${tempoRientro} o essere sostituito.`);
    }

    const idx = this.partite.findIndex(x => x.id === id);
    if (idx !== -1) {
        this.partite[idx] = { ...p, ...updates };
    }

    await this.salvaPartitaAsync(id, updates);
    this.render();
},

async rimuoviCartellino(id, squadra, index) {

                    const tempoTotale = 900 + (recupero * 60);
                    const percentuale = Math.min((secondi / tempoTotale) * 100, 100);
                    
                    const progressBar = document.getElementById('progress-bar');
                    if (progressBar) {
                        progressBar.style.width = `${percentuale}%`;
                        
                        if (percentuale > 90) {
                            progressBar.className = 'progress-bar h-full bg-red-500 rounded-full';
                        } else if (percentuale > 75) {
                            progressBar.className = 'progress-bar h-full bg-orange-500 rounded-full';
                        } else {
                            progressBar.className = 'progress-bar h-full bg-cyan-500 rounded-full';
                        }
                    }

                    const recuperoEl = document.getElementById('recupero-display');
                    if (recuperoEl && secondi > 900) {

            aggiungiSquadraManuale() {
                const nome = prompt('Nome della squadra:');
                if (!nome) return;
                
                const giocatori = [];
                let continua = true;
                
                while (continua) {
                    const numero = prompt(`Squadra: ${nome}\nNumero maglia (lascia vuoto per terminare):`);
                    if (!numero) break;
                    
                    const nomeGiocatore = prompt(`Squadra: ${nome}\nNome del giocatore n. ${numero}:`);
                    if (!nomeGiocatore) break;
                    
                    giocatori.push({ numero: parseInt(numero), nome: nomeGiocatore });
                    continua = confirm('Aggiungere un altro giocatore?');
                }
                
                if (giocatori.length > 0) {
                    this.squadre[nome] = giocatori;
                    this.salvaSquadre();
                    alert(`✓ Squadra "${nome}" aggiunta con ${giocatori.length} giocatori!`);
                    this.render();
                }
            },

            importaSquadre() {
                const url = prompt('Link Google Sheets (3 colonne: Squadra, Numero, Nome):');
                if (!url) return;
                
                let csvUrl = url;
                if (url.includes('/edit')) {
                    const sheetId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                    csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                }
                
                fetch(csvUrl)
                    .then(r => r.text())
                    .then(csv => {
                        Papa.parse(csv, {
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                results.data.forEach(row => {
                                    const sq = row.Squadra || row.squadra;
                                    const num = parseInt(row.Numero || row.numero);
                                    const nome = row.Nome || row.nome;
                                    if (sq && num && nome) {
                                        if (!this.squadre[sq]) {
                                            this.squadre[sq] = [];
                                        }
                                        const giocatoreEsiste = this.squadre[sq].some(g => g.numero === num && g.nome === nome);
                                        if (!giocatoreEsiste) {
                                            this.squadre[sq].push({ numero: num, nome });
                                        }
                                    }
                                });
                                this.salvaSquadre();
                                alert(`✓ Importate ${Object.keys(this.squadre).length} squadre!`);
                                this.render();
                            }
                        });
                    })
                    .catch(err => {
                        alert('✗ Errore import. Verifica che il link sia pubblico.');
                        console.error(err);
                    });
            },

            importaPartite() {
                const url = prompt('Link Google Sheets partite (colonne: Campo, Orario, SquadraA, SquadraB):');
                if (!url) return;
                
                let csvUrl = url;
                if (url.includes('/edit')) {
                    const sheetId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)[1];
                    csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                }
                
                fetch(csvUrl)
                    .then(r => r.text())

                                let importate = 0;

            calcolaClassifica() {
                const cls = {};
                this.partite.filter(p => p.completata).forEach(p => {
                    [p.squadraA, p.squadraB].forEach((sq, idx) => {
                        if (!cls[sq]) {
                            cls[sq] = { nome: sq, punti: 0, giocate: 0, vinte: 0,
                                pareggiate: 0, perse: 0, golFatti: 0, golSubiti: 0 };
                        }
                        const s = cls[sq];
                        s.giocate++;
                        if (idx === 0) {
                            s.punti += p.puntiA;
                            s.golFatti += p.punteggioA;
                            s.golSubiti += p.punteggioB;
                            if (p.punteggioA > p.punteggioB) s.vinte++;
                            else if (p.punteggioA === p.punteggioB) s.pareggiate++;
                            else s.perse++;
                        } else {
                            s.punti += p.puntiB;
                            s.golFatti += p.punteggioB;
                            s.golSubiti += p.punteggioA;
                            if (p.punteggioB > p.punteggioA) s.vinte++;
                            else if (p.punteggioA === p.punteggioB) s.pareggiate++;
                            else s.perse++;
                        }
                    });
                });
                return Object.values(cls).sort((a, b) => {
                    if (b.punti !== a.punti) return b.punti - a.punti;
                    const da = a.golFatti - a.golSubiti;
                    const db = b.golFatti - b.golSubiti;
                    if (db !== da) return db - da;
                    return b.golFatti - a.golFatti;
                });
            },

            calcolaStatistiche() {
    const m = {}, s = {}, v = {}, mvps = {};
    this.partite.forEach(p => {
        ['A', 'B'].forEach(sq => {
            const nome = p[`squadra${sq}`];
            
            // Filtra i gol escludendo le metà tecniche
            p[`gol${sq}`].forEach(g => {
                // Escludi gol che contengono "METÀ" (sono metà tecniche)
                if (!g.includes('METÀ') && !g.includes('META\'')) {
                    const k = `${g} (${nome})`;
                    m[k] = (m[k] || 0) + 1;
                }
            });
            
            p[`scalpi${sq}`].forEach(sc => {
                const k = `${sc} (${nome})`;
                s[k] = (s[k] || 0) + 1;
            });
            p[`vuoti${sq}`].forEach(vu => {
                const k = `${vu} (${nome})`;
                v[k] = (v[k] || 0) + 1;
            });
            if (p[`mvp${sq}`]) {
                const k = `${p[`mvp${sq}`]} (${nome})`;
                mvps[k] = (mvps[k] || 0) + 1;
            }
        });
    });
    return {
        marcatori: Object.entries(m).map(([nome, gol]) => ({ nome, gol })).sort((a, b) => b.gol - a.gol),
        scalpiatori: Object.entries(s).map(([nome, scalpi]) => ({ nome, scalpi })).sort((a, b) => b.scalpi - a.scalpi),
        vuotatori: Object.entries(v).map(([nome, vuoti]) => ({ nome, vuoti })).sort((a, b) => b.vuoti - a.vuoti),
        mvps: Object.entries(mvps).map(([nome, volte]) => ({ nome, volte })).sort((a, b) => b.volte - a.volte)
    };
},

                const inputId = `${tipo === 'scalpo' ? 'scalpo' : tipo}-${squadra}-${id}`;

                const val = input.tagName === 'SELECT' ? input.value : input.value.trim();
                
                if (!val) return;
                
                const key = tipo === 'gol' ? `gol${squadra}` : tipo === 'scalpo' ? `scalpi${squadra}` : null;
                if (!key) return;
                
                const nuovi = [...p[key], val];
                const updates = { [key]: nuovi };
                
                if (tipo === 'gol') {
                    updates[`punteggio${squadra}`] = nuovi.length;
                }
                
                const idx = this.partite.findIndex(x => x.id === id);
                if (idx !== -1) {
                    this.partite[idx] = { ...p, ...updates };
                }
                
                this.salvaPartitaAsync(id, updates);
                input.value = '';
                this.render();
            },

async salvaPartitaAsync(id, updates) {
    try {
        const p = this.partite.find(x => x.id === id);
        const u = { ...p, ...updates };
        
        await supabase.from('partite').update({
            squadra_a: u.squadraA, squadra_b: u.squadraB,
            gol_a: u.golA, gol_b: u.golB,
            scalpi_a: u.scalpiA, scalpi_b: u.scalpiB,
            vuoti_a: u.vuotiA, vuoti_b: u.vuotiB,
            espulsi_a: u.espulsiA, espulsi_b: u.espulsiB,
            punteggio_a: u.punteggioA, punteggio_b: u.punteggioB,
            punti_a: u.puntiA, punti_b: u.puntiB,
            mvp_a: u.mvpA, mvp_b: u.mvpB,
            completata: u.completata,
            vuoti_squadra_a: u.vuotiSquadraA,
            vuoti_squadra_b: u.vuotiSquadraB,
            falli_difesa_a: u.falliDifesaA,
            falli_difesa_b: u.falliDifesaB,
            cartellini_a: u.cartelliniA,
            cartellini_b: u.cartelliniB,
        }).eq('id', id);
    } catch (error) {
        console.error('Errore salvataggio asincrono:', error);
    }
},

            rimuoviElemento(id, squadra, tipo, index) {
    const p = this.partite.find(x => x.id === id);
    const key = tipo === 'gol' ? `gol${squadra}` : tipo === 'scalpo' ? `scalpi${squadra}` : tipo === 'vuoto' ? `vuoti${squadra}` : null;
    if (!key) return;
    
    const nuovi = [...p[key]];
    nuovi.splice(index, 1);
    const updates = { [key]: nuovi };
    
    if (tipo === 'gol') {
        updates[`punteggio${squadra}`] = nuovi.length;
    }

    if (tipo === 'vuoto') {
        updates[`vuotiSquadra${squadra}`] = Math.max(0, p[`vuotiSquadra${squadra}`] - 1);
    }
    
    const idx = this.partite.findIndex(x => x.id === id);
    if (idx !== -1) {
        this.partite[idx] = { ...p, ...updates };
    }
    
    this.salvaPartitaAsync(id, updates);
    this.render();
},

async aggiungiVuoto(id, squadra, giocatore) {
    const p = this.partite.find(x => x.id === id);
    const vuoti = [...p[`vuoti${squadra}`], giocatore];
    const conteggio = vuoti.filter(v => v === giocatore).length;
    
    // Incrementa contatore vuoti di squadra
    const vuotiSquadraCampo = `vuotiSquadra${squadra}`;
    const nuoviVuotiSquadra = p[vuotiSquadraCampo] + 1;
    
    let updates = { 
        [`vuoti${squadra}`]: vuoti,
        [vuotiSquadraCampo]: nuoviVuotiSquadra
    };
    
    // Espulsione al 3° vuoto personale
    if (conteggio === 3) {
        const espulsi = [...p[`espulsi${squadra}`], giocatore];
        updates[`espulsi${squadra}`] = espulsi;
        alert(`🟥 ESPULSIONE!\n${giocatore} ha 3 vuoti ed è stato espulso.`);
    }
    
    // Fallo di difesa ai vuoti di squadra
    let messaggioFallo = '';
    if (nuoviVuotiSquadra === 14 || (nuoviVuotiSquadra > 14 && (nuoviVuotiSquadra - 14) % 3 === 0)) {
        const nuoviFalli = p[`falliDifesa${squadra}`] + 1;
        updates[`falliDifesa${squadra}`] = nuoviFalli;
        
        // Controlla se è il 3° fallo -> Assegna metà
        if (nuoviFalli === 3) {
            const squadraOpposta = squadra === 'A' ? 'B' : 'A';
            
            // Azzera falli e assegna metà
            updates[`falliDifesa${squadra}`] = 0;
            
            const golOpposti = [...p[`gol${squadraOpposta}`], 'METÀ (3° Fallo difesa)'];
            updates[`gol${squadraOpposta}`] = golOpposti;
            updates[`punteggio${squadraOpposta}`] = golOpposti.length;
            
            messaggioFallo = `\n\n⚠️ ${nuoviVuotiSquadra}° VUOTO DI SQUADRA!\n3° FALLO DI DIFESA!\n\nMETÀ assegnata a ${p[`squadra${squadraOpposta}`]}`;
        } else {
            messaggioFallo = `\n\n⚠️ ${nuoviVuotiSquadra}° VUOTO DI SQUADRA!\nFallo di difesa assegnato (${nuoviFalli}/3).`;
        }
    }
    
    const idx = this.partite.findIndex(x => x.id === id);
    if (idx !== -1) {
        this.partite[idx] = { ...p, ...updates };
    }
    
    await this.salvaPartitaAsync(id, updates);
    
    if (messaggioFallo) {
        alert(messaggioFallo);
    }
    
    this.render();
},

            async confermaSalvaPartita(id) {
    const p = this.partite.find(x => x.id === id);
    const mvpA = document.getElementById('mvp-select-a').value;
    const mvpB = document.getElementById('mvp-select-b').value;

    // Alert se si è ancora nel 1° tempo
    if (p.timerTempo === 1 && (p.timerAttivo || p.timerSecondi > 0)) {
        alert('⚠️ ATTENZIONE!\n\nIl 2° tempo non è ancora iniziato.\n\nPassa al 2° tempo prima di finalizzare la partita.');
        return;
    }

    // Alert se mancano gli MVP
    if (!mvpA || !mvpB) {
        const mancanti = [];
        if (!mvpA) mancanti.push(p.squadraA);
        if (!mvpB) mancanti.push(p.squadraB);
        
        const conferma = confirm(`⚠️ MVP non selezionati per:\n${mancanti.join('\n')}\n\nVuoi finalizzare comunque senza MVP?`);
        if (!conferma) return;
    }

    const scoreA = p.golA.length;
    const scoreB = p.golB.length;
    let puntiA = 0, puntiB = 0;
    
    if (scoreA > scoreB) puntiA = 3;
    else if (scoreB > scoreA) puntiB = 3;
    else { puntiA = 1; puntiB = 1; }
    
    await this.fermaTimer(id);
    await this.rilasciaControlloPartita(id);
    await this.aggiornaPartita(id, { 
        punteggioA: scoreA, punteggioB: scoreB,

    });

    const espulsi = p[`espulsi${squadra}`];
    const punteggio = p[`punteggio${squadra}`];
    const isDisabilitato = (gNome) => {
    // Squalificato torneo
    if (this.squalifiche.some(s => s.nome_giocatore === gNome && s.nome_squadra === nome)) {
        return { disabilitato: true, motivo: '⬛ SQUAL' };

    // Cartellino rosso = escluso tutta la partita

    // Cartellino giallo = escluso solo nel tempo in cui è stato preso
    if (p[`cartellini${squadra}`].some(c => c.giocatore === gNome && c.tipo === 'giallo' && c.tempo === p.timerTempo)) {
        return { disabilitato: true, motivo: '🟨 ESP' };

    return { disabilitato: false, motivo: '' };

                <div class="flex gap-2 mb-3">
                    ${giocatori.length > 0 ? `
                        <select id="vuoto-${squadra}-${p.id}" class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
                            <option value="">-- Seleziona --</option>
                            ${giocatori.map(g => {
    const gNome = `${g.numero} - ${g.nome}`;
    const cnt = vuotiPerGiocatore[gNome] || 0;
    const { disabilitato, motivo } = isDisabilitato(gNome);
    return `<option value="${gNome}" ${disabilitato ? 'disabled' : ''}>${gNome}${cnt > 0 ? ` (${cnt})` : ''}${motivo ? ' ' + motivo : ''}</option>`;
}).join('')}
                        </select>
                    ` : `
                        <input type="text" id="vuoto-${squadra}-${p.id}" placeholder="Nome" class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
                    `}
                    <button onclick="app.aggiungiVuotoBtn(${p.id}, '${squadra}')" class="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded font-bold">+</button>
                </div>
                <div class="space-y-2 max-h-32 overflow-y-auto">
                    ${vuoti.map((v, i) => {
                        const cnt = vuotiPerGiocatore[v];
                        return `
                            <div class="bg-gray-700 rounded px-3 py-2 flex justify-between items-center text-sm ${cnt >= 3 ? 'border-2 border-red-500 bg-red-900 bg-opacity-30' : ''}">
                                <span>🔵 ${v} ${cnt >= 2 ? `<span class="text-orange-400 font-bold">(${cnt}/3)</span>` : ''}</span>
                                <button onclick="app.rimuoviElemento(${p.id}, '${squadra}', 'vuoto', ${i})" class="text-red-400 hover:text-red-300">✕</button>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>

            <div class="mt-6 border-t border-gray-700 pt-6">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">🟨</span>
                        <span class="font-bold text-gray-200">Cartellini</span>
                    </div>
                </div>

                <div class="flex gap-2 mb-3">
                    ${giocatori.length > 0 ? `
                        <select id="cartellino-giocatore-${squadra}-${p.id}" class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                            <option value="">-- Seleziona giocatore --</option>
                            ${giocatori.map(g => {
    const gNome = `${g.numero} - ${g.nome}`;
    const { disabilitato, motivo } = isDisabilitato(gNome);
    return `<option value="${gNome}" ${disabilitato ? 'disabled' : ''}>${gNome}${motivo ? ' ' + motivo : ''}</option>`;
}).join('')}
                        </select>
                    ` : `
                        <input type="text" id="cartellino-giocatore-${squadra}-${p.id}" placeholder="Nome giocatore" class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white text-sm">
                    `}
                </div>
                
                <div class="flex gap-2 mb-3">
                    <button onclick="
                        const el = document.getElementById('cartellino-giocatore-${squadra}-${p.id}');
                        const val = el.tagName === 'SELECT' ? el.value : el.value.trim();
                        if (!val) return;
                        app.aggiungiCartellino(${p.id}, '${squadra}', val, 'giallo');
                        el.value = '';
                    " class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black px-3 py-2 rounded font-bold text-sm border-2 border-yellow-300">
                        🟨 Giallo
                    </button>
                    <button onclick="
                        const el = document.getElementById('cartellino-giocatore-${squadra}-${p.id}');
                        const val = el.tagName === 'SELECT' ? el.value : el.value.trim();
                        if (!val) return;
                        app.aggiungiCartellino(${p.id}, '${squadra}', val, 'rosso');
                        el.value = '';
                    " class="flex-1 bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded font-bold text-sm border-2 border-red-400">
                        🟥 Rosso
                    </button>
                    <button onclick="
                        const el = document.getElementById('cartellino-giocatore-${squadra}-${p.id}');
                        const val = el.tagName === 'SELECT' ? el.value : el.value.trim();
                        if (!val) return;
                        app.aggiungiCartellino(${p.id}, '${squadra}', val, 'nero');
                        el.value = '';
                    " class="flex-1 bg-gray-900 hover:bg-gray-800 text-white px-3 py-2 rounded font-bold text-sm border-2 border-gray-500">
                        ⬛ Nero
                    </button>
                </div>

                <div class="space-y-2 max-h-32 overflow-y-auto">
                    ${p[`cartellini${squadra}`].map((c, i) => `
                        <div class="rounded px-3 py-2 flex justify-between items-center text-sm ${
                            c.tipo === 'giallo' ? 'bg-yellow-900 bg-opacity-40 border border-yellow-700' :
                            c.tipo === 'rosso' ? 'bg-red-900 bg-opacity-40 border border-red-700' :
                            'bg-gray-900 border border-gray-600'
                        }">
                            <span class="${c.tipo === 'giallo' ? 'text-yellow-200' : c.tipo === 'rosso' ? 'text-red-200' : 'text-gray-200'}">
                                ${c.tipo === 'giallo' ? '🟨' : c.tipo === 'rosso' ? '🟥' : '⬛'} 
                                ${c.giocatore} 
                                <span class="text-xs opacity-70">(${c.tipo === 'giallo' ? 'Escl. ' + c.tempo + '°T' : c.tipo === 'rosso' ? 'Escl. partita' : 'Squalificato'})</span>
                            </span>
                            <button onclick="app.rimuoviCartellino(${p.id}, '${squadra}', ${i})" class="text-red-400 hover:text-red-300 ml-2">✕</button>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="mt-6 border-t border-gray-700 pt-6">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-orange-400 text-xl">⚠️</span>
                        <span class="font-bold text-gray-200">Falli di Difesa</span>
                    </div>
                    <div class="text-2xl font-bold ${p[`falliDifesa${squadra}`] >= 2 ? 'text-red-400 animate-pulse' : 'text-orange-400'}">
                        ${p[`falliDifesa${squadra}`]}/3
                    </div>
                </div>
                <button onclick="app.aggiungiFalloDifesa(${p.id}, '${squadra}')" class="w-full ${p[`falliDifesa${squadra}`] >= 2 ? 'bg-red-600 hover:bg-red-700' : 'bg-orange-600 hover:bg-orange-700'} text-white px-4 py-2 rounded font-bold">
                    + Aggiungi Fallo
                </button>
                ${p[`falliDifesa${squadra}`] === 2 ? '<p class="text-xs text-red-400 mt-2 text-center font-bold animate-pulse">🚨 ATTENZIONE! Prossimo fallo = METÀ! 🚨</p>' : 
                  p[`falliDifesa${squadra}`] === 1 ? '<p class="text-xs text-orange-400 mt-2 text-center">⚠️ 1 fallo registrato</p>' : ''}
            </div>
        </div>
    `;
},
            renderRiepilogo(p, squadra) {
                const nome = p[`squadra${squadra}`];
                const gol = p[`gol${squadra}`];
                const scalpi = p[`scalpi${squadra}`];
                const punteggio = p[`punteggio${squadra}`];
                const mvp = p[`mvp${squadra}`];

                return `
                    <div class="bg-gray-800 rounded-lg p-6 shadow-xl border border-gray-700">
                        <h2 class="text-2xl font-bold text-cyan-300 mb-4">${nome}</h2>
                        <div class="text-4xl font-bold text-yellow-400 mb-6">${punteggio}</div>
                        
                        <div class="mb-6">
                            <div class="text-sm text-gray-400 mb-2">Gol: ${gol.length}</div>
                            <div class="bg-gray-700 rounded p-4 text-sm space-y-2">
                                ${gol.length > 0 ? gol.map(g => `
    <div class="${g.includes('META') ? 'text-orange-300' : 'text-cyan-300'}">
        ${g.includes('META') ? '🏅' : '⚽'} ${g}
    </div>`).join('') : '<div class="text-gray-500">Nessun gol</div>'}
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <div class="text-sm text-gray-400 mb-2">Scalpi: ${scalpi.length}</div>
                            <div class="bg-gray-700 rounded p-4 text-sm space-y-2">
                                ${scalpi.length > 0 ? scalpi.map(s => `<div class="text-red-300">🔪 ${s}</div>`).join('') : '<div class="text-gray-500">Nessuno scalpo</div>'}
                            </div>
                        </div>

${p[`cartellini${squadra}`].length > 0 ? `
    <div class="mb-6">
        <div class="text-sm text-gray-400 mb-2">Cartellini: ${p[`cartellini${squadra}`].length}</div>
        <div class="bg-gray-700 rounded p-4 text-sm space-y-2">
            ${p[`cartellini${squadra}`].map(c => `
                <div class="${c.tipo === 'giallo' ? 'text-yellow-300' : c.tipo === 'rosso' ? 'text-red-300' : 'text-gray-300'}">
                    ${c.tipo === 'giallo' ? '🟨' : c.tipo === 'rosso' ? '🟥' : '⬛'} ${c.giocatore}
                    <span class="text-xs opacity-70">(${c.tipo === 'giallo' ? c.tempo + '° tempo' : c.tipo === 'rosso' ? 'partita' : 'torneo'})</span>
                </div>
            `).join('')}
        </div>
    </div>
` : ''}

                        ${mvp ? `
                            <div class="bg-purple-900 bg-opacity-40 border border-purple-700 rounded-lg p-4">
                                <div class="text-sm text-gray-400 mb-1">MVP</div>
                                <div class="text-lg font-bold text-purple-300">⭐ ${mvp}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            app.init();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('✓ PWA pronta'))
                    .catch(err => console.log('Service Worker:', err));
            }
        });
    </script>
</body>
</html>
